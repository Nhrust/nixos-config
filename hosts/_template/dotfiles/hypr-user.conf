# =============================================================================
# hosts/_template/dotfiles/hypr-user.conf — Декларативный Hyprland override
# =============================================================================
# Если этот файл лежит в hosts/<host>/dotfiles/hypr-user.conf, он симлинкается
# в ~/.config/hypr/user.conf (read-only из /nix/store). Подключается ПОСЛЕДНИМ
# в hyprland.conf — твои директивы override-ят дефолтные из modules/.
#
# Альтернатива — mutable правка ~/.config/hypr/user.conf (создаётся из template
# при первой установке, потом юзер свободно правит). Декларативный путь удобен
# когда хочешь чтобы твои Hyprland-правки переезжали между машинами вместе с
# репо.
#
# Чтобы активировать этот файл:
#   1. cp -r hosts/_template hosts/$(hostname)
#   2. Отредактируй под себя (что не нужно — закомментируй или удали)
#   3. nrs
#   4. Проверь: readlink ~/.config/hypr/user.conf → должно показать /nix/store/...
# =============================================================================

# ── Свои бинды (имеют приоритет над binds.conf из modules/) ──────────────────
# bind = SUPER, B, exec, firefox
# bind = SUPER, D, exec, discord
# bind = SUPER, M, exec, spotify
# bind = SUPER CTRL, K, exec, kitty --hold -e htop

# ── Свои мониторы (override default monitors.conf) ───────────────────────────
# monitor = DP-1, 2560x1440@144, 0x0, 1
# monitor = HDMI-A-1, 1920x1080@60, 2560x0, 1
# monitor = , preferred, auto, 1   # дефолт для не описанных мониторов

# ── Autostart дополнительных программ ────────────────────────────────────────
# exec-once = telegram-desktop --hidden
# exec-once = nextcloud --background

# ── Windowrules (override windowrules.conf) ──────────────────────────────────
# windowrule = float, ^(pavucontrol)$
# windowrule = workspace 5, ^(steam)$
# windowrule = workspace 6, ^(obsidian)$

# ── Override параметров (general / decoration / animations) ──────────────────
# general {
#     gaps_in       = 8     # default 5
#     gaps_out      = 16    # default 10
#     border_size   = 3     # default 2
# }
#
# decoration {
#     rounding = 14
#     blur {
#         enabled  = true
#         size     = 8
#         passes   = 3
#     }
# }

# ── Свои переменные окружения ────────────────────────────────────────────────
# env = MY_VAR,my_value
# env = CURSOR_SIZE,32
