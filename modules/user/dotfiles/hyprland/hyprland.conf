# =============================================================================
# hyprland.conf — Базовая конфигурация Hyprland
# =============================================================================

# ── Мониторы ────────────────────────────────────────────────────────────────
# auto auto = автоопределение разрешения и позиции
# Для нескольких мониторов задавай явно: monitor=DP-1,2560x1440@144,0x0,1
monitor=,preferred,auto,auto

# ── Автозапуск ──────────────────────────────────────────────────────────────
exec-once = waybar
exec-once = mako
exec-once = hyprpaper
exec-once = hypridle
exec-once = hyprpolkitagent

# ── Переменные окружения ────────────────────────────────────────────────────
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

# ── Ввод ────────────────────────────────────────────────────────────────────
input {
    kb_layout    = us,ru
    kb_options   = grp:win_space_toggle
    follow_mouse = 1

    touchpad {
        natural_scroll     = true
        disable_while_typing = true
    }
}

# ── Внешний вид ─────────────────────────────────────────────────────────────
general {
    gaps_in     = 4
    gaps_out    = 8
    border_size = 2
    layout      = dwindle
}

decoration {
    rounding = 8

    blur {
        enabled = true
        size    = 3
        passes  = 1
    }

    shadow {
        enabled = true
        range   = 4
        render_power = 3
    }
}

animations {
    enabled = true
    bezier  = ease, 0.25, 0.46, 0.45, 0.94

    animation = windows,     1, 5, ease
    animation = windowsOut,  1, 5, ease, popin 80%
    animation = border,      1, 5, default
    animation = fade,        1, 5, default
    animation = workspaces,  1, 5, ease
}

dwindle {
    pseudotile     = true
    preserve_split = true
}

misc {
    disable_hyprland_logo  = true
    disable_splash_rendering = true
}

# ── Биндинги ────────────────────────────────────────────────────────────────
$mod = SUPER

# Базовое
bind = $mod, Q, exec, kitty
bind = $mod, C, killactive
bind = $mod, M, exit
bind = $mod, E, exec, thunar
bind = $mod, V, togglefloating
bind = $mod, R, exec, wofi --show drun
bind = $mod, P, pseudo
bind = $mod, J, togglesplit
bind = $mod, F, fullscreen
bind = $mod, L, exec, hyprlock

# Фокус
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d

# Воркспейсы
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# Переместить окно на воркспейс
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Мышь
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Скриншоты
bind = ,         Print, exec, grim -g "$(slurp)" - | wl-copy
bind = SHIFT,    Print, exec, grim ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png

# Громкость / яркость
bindel = , XF86AudioRaiseVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute,         exec, wpctl set-mute   @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86MonBrightnessUp,   exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
