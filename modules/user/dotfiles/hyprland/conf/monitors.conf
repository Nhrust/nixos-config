# =============================================================================
# monitors.conf — Конфигурация мониторов
# =============================================================================
# Формат: monitor=НАЗВАНИЕ,РАЗРЕШЕНИЕ@ЧАСТОТА,ПОЗИЦИЯ,МАСШТАБ
#
# Узнать имена подключённых мониторов: hyprctl monitors
# Примеры:
#   monitor=DP-1,2560x1440@144,0x0,1
#   monitor=HDMI-A-1,1920x1080@60,2560x0,1
#   monitor=eDP-1,preferred,auto,1.5    # ноутбучный экран с HiDPI
# =============================================================================

# По умолчанию — автоопределение всех мониторов с предпочитаемым разрешением
monitor=,preferred,auto,auto
