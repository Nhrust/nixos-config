# =============================================================================
# general.conf — Общие настройки compositor
# =============================================================================

general {
    gaps_in     = 4         # отступы между окнами
    gaps_out    = 8         # отступы от краёв экрана
    border_size = 2
    layout      = dwindle   # двухпанельный layout с автоделением

    # Цвета бордеров — переопределяются catppuccin-nix автоматически
    # col.active_border   = ...
    # col.inactive_border = ...

    resize_on_border  = true
    allow_tearing     = false
}

# Dwindle layout
# Замечание: `pseudotile` — это dispatcher (используется в биндах:
# `bind = SUPER, P, pseudo`), а не опция dwindle. Здесь её НЕ должно быть.
dwindle {
    preserve_split = true   # при перемещении окон сохранять направление сплита
}

master {
    new_status = master     # новые окна становятся master (главным)
}
