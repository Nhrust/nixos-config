# =============================================================================
# autostart.conf — Автозапуск при старте Hyprland сессии
# =============================================================================
# Сюда идут только сервисы, которые нужны на ВСЕХ профилях.
# Профиль-специфичные exec-once (например hypridle на laptop/desktop, но не
# на server) живут в conf/profile/<profile>.conf.
# =============================================================================

exec-once = waybar              # статус-бар
exec-once = mako                # уведомления
exec-once = hyprpaper           # обои
exec-once = hyprpolkitagent     # запросы прав от GUI приложений

# pyprland (scratchpads + smart_gaps) — запускается только если установлен.
# Если settings.hyprland.pyprland = false, пакета нет, exec тихо пропускается.
exec-once = command -v pypr >/dev/null && pypr

# cliphist — watcher на буфер обмена. Каждое copy сохраняется в историю,
# доступную через Super+V (выбор через wofi → push обратно в буфер).
# Запускается только если cliphist установлен (idempotent, безопасно).
exec-once = command -v cliphist >/dev/null && wl-paste --type text  --watch cliphist store
exec-once = command -v cliphist >/dev/null && wl-paste --type image --watch cliphist store
