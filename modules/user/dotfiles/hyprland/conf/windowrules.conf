# =============================================================================
# windowrules.conf — Правила для конкретных окон
# =============================================================================
# Узнать class/title окна: hyprctl clients
# Документация: https://wiki.hyprland.org/Configuring/Window-Rules/
# =============================================================================

# Плавающие окна для диалогов и пикеров
windowrulev2 = float,    class:^(pavucontrol)$
windowrulev2 = float,    class:^(blueman-manager)$
windowrulev2 = float,    class:^(file-roller)$
windowrulev2 = float,    title:^(Open File)$
windowrulev2 = float,    title:^(Save File)$
windowrulev2 = float,    title:^(File Operation Progress)$

# Размер для pavucontrol
windowrulev2 = size 800 500, class:^(pavucontrol)$
windowrulev2 = center,       class:^(pavucontrol)$

# Picture-in-Picture браузеров — всегда поверх
windowrulev2 = float,        title:^(Picture-in-Picture)$
windowrulev2 = pin,          title:^(Picture-in-Picture)$

# Полноэкранные приложения — без скруглений и теней
windowrulev2 = noshadow,     fullscreen:1
windowrulev2 = noborder,     fullscreen:1
