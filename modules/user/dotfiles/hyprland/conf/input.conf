# =============================================================================
# input.conf — Клавиатура, мышь, тачпад
# =============================================================================

input {
    # Двойная раскладка us / ru, переключение Win+Space
    kb_layout    = us,ru
    kb_options   = grp:win_space_toggle

    follow_mouse = 1   # фокус следует за мышью
    sensitivity  = 0   # -1.0 ... 1.0, 0 = системное значение

    touchpad {
        natural_scroll       = true
        disable_while_typing = true
        tap-to-click         = true
        clickfinger_behavior = true   # двумя пальцами = ПКМ, тремя = СКМ
    }
}

# Альтернативный фокус для геймпада / клавиатуры без мыши
gestures {
    workspace_swipe = true
    workspace_swipe_fingers = 3
}
