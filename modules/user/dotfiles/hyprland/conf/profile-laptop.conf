# =============================================================================
# conf/profile-laptop.conf — Поведение, специфичное для ноутбука
# =============================================================================
# Подключается через conf/profile.conf, выбирается автоматически по
# settings.profile = "laptop" в hosts/<имя>/settings.nix.
#
# Закрытие крышки: гасит экран и блокирует сессию.
# НЕ суспендит — wifi, музыка, компиляция продолжают работать.
# Suspend на уровне systemd-logind отключён в modules/system/profiles/laptop.nix
# (lidSwitch = "ignore").
# =============================================================================

# Имя устройства может отличаться на твоём железе. Узнать точно:
#   hyprctl devices
# и найти секцию "Switches:". Если у тебя не "Lid Switch", замени имя ниже.

bindl = , switch:on:Lid Switch,  exec, loginctl lock-session && hyprctl dispatch dpms off
bindl = , switch:off:Lid Switch, exec, hyprctl dispatch dpms on
