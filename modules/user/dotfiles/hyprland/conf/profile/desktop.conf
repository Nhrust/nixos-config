# =============================================================================
# conf/profile/desktop.conf — Поведение, специфичное для десктопа
# =============================================================================
# У десктопа нет крышки и батареи, но мы всё равно запускаем hypridle
# для авто-лока и гашения экрана по таймауту (см. idle/desktop.conf, 5 минут).
# На server hypridle не запускается, поэтому autostart здесь, а не в autostart.conf.
# =============================================================================

exec-once = hypridle
