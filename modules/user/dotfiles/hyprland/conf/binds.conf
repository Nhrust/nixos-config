# =============================================================================
# binds.conf — Биндинги клавиш
# =============================================================================
# Типы биндингов в Hyprland:
#   bind   — обычный бинд, срабатывает при нажатии
#   bindm  — мышиный бинд (движение/ресайз окна мышью)
#   bindl  — Locked: работает даже когда экран залочен. Для медиа (play/next).
#   bindel — Event+Locked: повтор при удержании, работает в локе.
#            Для громкости / яркости.
#
# $mod = SUPER — клавиша Win/Super.
# =============================================================================

$mod = SUPER

# ── Запуск приложений ──────────────────────────────────────────────────────
bind = $mod, Q, exec, kitty                # терминал
bind = $mod, E, exec, thunar               # файловый менеджер (E = Explorer)
bind = $mod, R, exec, wofi --show drun     # лаунчер приложений (R = Run, как Win+R)
bind = $mod, L, exec, hyprlock             # залочить экран (L = Lock)

# ── Управление активным окном ──────────────────────────────────────────────
bind = $mod,       C, killactive           # закрыть окно (C = Close)
bind = $mod,       V, togglefloating       # окно в плавающий режим (вырывается из тайла)
bind = $mod,       P, pseudo               # псевдо-тайл: окно занимает слот,
                                           # но рендерится в своём исходном размере.
                                           # Полезно для маленьких диалогов.
bind = $mod,       J, togglesplit          # сменить направление следующего сплита
                                           # (горизонтально <-> вертикально)
bind = $mod,       F, fullscreen           # на весь экран
bind = $mod SHIFT, R, exec, hyprctl reload # перечитать конфиг Hyprland (не сессию)
bind = $mod SHIFT, M, exit                 # !!! ВЫЙТИ ИЗ HYPRLAND — закроет всё !!!
                                           # вернёт на tuigreet. Случайное нажатие = смерть сессии.

# ── Перемещение фокуса между окнами (стрелки) ──────────────────────────────
bind = $mod, left,  movefocus, l           # фокус влево
bind = $mod, right, movefocus, r           # фокус вправо
bind = $mod, up,    movefocus, u           # фокус вверх
bind = $mod, down,  movefocus, d           # фокус вниз

# ── Перемещение самого окна (Shift+стрелки) ────────────────────────────────
bind = $mod SHIFT, left,  movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up,    movewindow, u
bind = $mod SHIFT, down,  movewindow, d

# ── Воркспейсы 1–10 ────────────────────────────────────────────────────────
# Super+цифра — переключиться на воркспейс
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10              # ноль = воркспейс 10

# Super+Shift+цифра — перенести активное окно на воркспейс
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Скролл колеса мыши с зажатым Super — переключение по существующим воркспейсам.
# e+1 / e-1 пропускает несуществующие воркспейсы (умное переключение).
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up,   workspace, e-1

# ── Мышь: drag окна и resize ──────────────────────────────────────────────
# Зажми Super и тяни мышью левой или правой кнопкой:
bindm = $mod, mouse:272, movewindow        # 272 = ЛКМ → перетаскивать окно
bindm = $mod, mouse:273, resizewindow      # 273 = ПКМ → менять размер окна

# ── Скриншоты (клавиша Print Screen) ───────────────────────────────────────
# Без модификаторов     — выделить область → в буфер обмена (Ctrl+V вставит)
# Shift + Print Screen  — весь экран → файл ~/Pictures/screenshot-YYYYMMDD-HHMMSS.png
# Ctrl  + Print Screen  — выделить область → файл ~/Pictures/screenshot-...png
#
# ВАЖНО: папка ~/Pictures должна существовать, иначе варианты с файлом
# молча упадут. Создать: mkdir -p ~/Pictures
bind = ,      Print, exec, grim -g "$(slurp)" - | wl-copy
bind = SHIFT, Print, exec, grim ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png
bind = CTRL,  Print, exec, grim -g "$(slurp)" ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png

# ── Громкость и яркость (мультимедиа-клавиши, обычно Fn+F* на ноуте) ───────
# bindel — повтор при удержании, работает даже на залоченном экране.
# Громкость через скрипт-обёртку — гарантирует cap на 100% и auto-mute при 0%.
# При желании можно вернуть прямой wpctl, но тогда теряется ограничение.
bindel = , XF86AudioRaiseVolume,  exec, ~/.config/hypr/scripts/volume.sh up
bindel = , XF86AudioLowerVolume,  exec, ~/.config/hypr/scripts/volume.sh down
bindel = , XF86AudioMute,         exec, ~/.config/hypr/scripts/volume.sh mute
bindel = , XF86AudioMicMute,      exec, wpctl set-mute   @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp,   exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# ── Управление воспроизведением (медиа-клавиши) ────────────────────────────
# bindl — работает даже с залоченным экраном. Можно поставить на паузу не
# разблокируя. playerctl понимает Spotify, Firefox, mpv, и т.д.
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = , XF86AudioNext, exec, playerctl next
