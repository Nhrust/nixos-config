# =============================================================================
# binds.conf — Биндинги клавиш
# =============================================================================
# Типы биндингов в Hyprland:
#   bind   — обычный бинд, срабатывает при нажатии
#   bindm  — мышиный бинд (движение/ресайз окна мышью)
#   bindl  — Locked: работает даже когда экран залочен. Для медиа (play/next).
#   bindel — Event+Locked: повтор при удержании, работает в локе.
#            Для громкости / яркости.
#
# $mod = SUPER — клавиша Win/Super.
#
# Личные бинды юзера живут в ~/.config/hypr/user.conf — он подключается
# ПОСЛЕДНИМ и переопределяет любые бинды отсюда. См. user.conf для примеров.
# =============================================================================

$mod = SUPER

# ── Запуск приложений ──────────────────────────────────────────────────────
bind = $mod, T, exec, kitty                # терминал (T = Terminal)
bind = $mod, E, exec, thunar               # файловый менеджер (E = Explorer)
bind = $mod, R, exec, wofi --show drun     # лаунчер приложений (R = Run, как Win+R)
bind = $mod, L, exec, hyprlock             # залочить экран (L = Lock)

# ── Управление активным окном ──────────────────────────────────────────────
bind = $mod,       Q, killactive           # закрыть окно. Приложения с tray-режимом
                                           # (Telegram, Discord, Steam) уйдут в трей,
                                           # фоновая часть продолжит работать.
bind = $mod SHIFT, Q, forcekillactive      # nuke-кнопка: SIGKILL зависшему окну.
                                           # Использовать когда обычный close не работает.
bind = $mod,       V, togglefloating       # окно в плавающий режим
bind = $mod,       P, pseudo               # псевдо-тайл: окно занимает слот, но
                                           # рендерится в своём исходном размере.
bind = $mod,       J, layoutmsg, togglesplit  # сменить направление следующего сплита (через layoutmsg в Hyprland 0.55+)
bind = $mod,       F, fullscreen           # на весь экран
bind = $mod SHIFT, R, exec, hyprctl reload # перечитать конфиг Hyprland (не сессию)

# ── Logout-меню (вместо опасного Super+Shift+M = exit) ─────────────────────
# Ctrl+Alt+Delete открывает wlogout. Lock / Logout / Suspend / Hibernate / Reboot / Shutdown.
bind = CTRL ALT, Delete, exec, wlogout

# ── Pyprland scratchpads (Super+grave = ` под Tab) ─────────────────────────
bind = $mod,       grave, exec, pypr toggle term     # терминал поверх всего
bind = $mod SHIFT, N,     exec, pypr toggle notes    # заметки в helix

# ── Перемещение фокуса между окнами (стрелки) ──────────────────────────────
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d

# ── Перемещение самого окна (Shift+стрелки) ────────────────────────────────
bind = $mod SHIFT, left,  movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up,    movewindow, u
bind = $mod SHIFT, down,  movewindow, d

# ── Воркспейсы 1–10 ────────────────────────────────────────────────────────
# Super+цифра — переключиться на воркспейс
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10              # ноль = воркспейс 10

# Super+Shift+цифра — перенести активное окно на воркспейс
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Скролл колеса мыши с зажатым Super — переключение по существующим воркспейсам.
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up,   workspace, e-1

# ── Мышь: drag окна и resize ──────────────────────────────────────────────
bindm = $mod, mouse:272, movewindow        # 272 = ЛКМ → перетаскивать окно
bindm = $mod, mouse:273, resizewindow      # 273 = ПКМ → менять размер окна

# ── Скриншоты (клавиша Print Screen) ───────────────────────────────────────
bind = ,      Print, exec, grim -g "$(slurp)" - | wl-copy
bind = SHIFT, Print, exec, grim ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png
bind = CTRL,  Print, exec, grim -g "$(slurp)" ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png

# ── Power profiles (Super+F1/F2/F3 — performance/balanced/powersave) ───────
# Меняют профиль на лету через power-profiles-daemon, показывают уведомление.
bind = $mod, F1, exec, powerprofilesctl set performance && notify-send "Power" " Performance"
bind = $mod, F2, exec, powerprofilesctl set balanced    && notify-send "Power" " Balanced"
bind = $mod, F3, exec, powerprofilesctl set power-saver && notify-send "Power" " Power Saver"

# ── Blue-light filter (Hyprshade) ──────────────────────────────────────────
bind = $mod, F11, exec, hyprshade toggle blue-light-filter

# ── Громкость и яркость (мультимедиа-клавиши) ──────────────────────────────
# Громкость через скрипт-обёртку — гарантирует cap на 100% и auto-mute при 0%.
bindel = , XF86AudioRaiseVolume,  exec, ~/.config/hypr/scripts/volume.sh up
bindel = , XF86AudioLowerVolume,  exec, ~/.config/hypr/scripts/volume.sh down
bindel = , XF86AudioMute,         exec, ~/.config/hypr/scripts/volume.sh mute
bindel = , XF86AudioMicMute,      exec, wpctl set-mute   @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp,   exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# ── Управление воспроизведением (медиа-клавиши) ────────────────────────────
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = , XF86AudioNext, exec, playerctl next
