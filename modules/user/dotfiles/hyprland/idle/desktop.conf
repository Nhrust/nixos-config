# =============================================================================
# idle/desktop.conf — Idle daemon для десктопа
# =============================================================================
# 5 минут простоя → экран гаснет И сессия лочится одновременно.
# Десктоп не имеет крышки и батареи — ничего больше не нужно.
# =============================================================================

general {
    lock_cmd         = pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd  = hyprctl dispatch dpms on
}

# Экран гаснет и лочится через 5 минут простоя
listener {
    timeout    = 300
    on-timeout = loginctl lock-session && hyprctl dispatch dpms off
    on-resume  = hyprctl dispatch dpms on
}
