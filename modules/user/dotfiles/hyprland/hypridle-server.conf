# =============================================================================
# hypridle-server.conf — Idle daemon для 24/7 машины
# =============================================================================
# Сервер не гасит экран и не суспендит автоматом — это машина для непрерывной
# работы. Но lock_cmd определён, чтобы ручной `loginctl lock-session`
# мог разбудить hyprlock если кто-то всё-таки сидит за консолью.
# Никаких listener'ов — никакого автоматического поведения по таймауту.
# =============================================================================

general {
    lock_cmd = pidof hyprlock || hyprlock
}
