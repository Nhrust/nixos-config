# =============================================================================
# hypridle-laptop.conf — Idle daemon для ноутбука
# =============================================================================
# 3 минуты простоя → экран гаснет И сессия лочится одновременно.
# Suspend здесь не настраивается — закрытие крышки/принудительный suspend
# ловятся отдельно (см. modules/system/profiles/laptop.nix и conf/profile-laptop.conf).
# Музыка, wifi, компиляция продолжают работать когда экран потушен.
# =============================================================================

general {
    lock_cmd         = pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd  = hyprctl dispatch dpms on
}

# Экран гаснет и лочится через 3 минуты простоя
listener {
    timeout    = 180
    on-timeout = loginctl lock-session && hyprctl dispatch dpms off
    on-resume  = hyprctl dispatch dpms on
}
