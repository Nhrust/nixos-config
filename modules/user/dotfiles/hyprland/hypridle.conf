# hypridle.conf — Idle daemon
# Блокирует экран и усыпляет машину после периодов бездействия.

general {
    lock_cmd       = pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd  = hyprctl dispatch dpms on
}

# Выключить экран после 5 минут простоя
listener {
    timeout    = 300
    on-timeout = hyprctl dispatch dpms off
    on-resume  = hyprctl dispatch dpms on
}

# Заблокировать после 10 минут
listener {
    timeout    = 600
    on-timeout = loginctl lock-session
}

# Suspend после 30 минут (только для ноутбуков на батарее)
listener {
    timeout    = 1800
    on-timeout = systemctl suspend
}
