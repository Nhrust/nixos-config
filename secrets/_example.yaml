# =============================================================================
# secrets/_example.yaml — Пример структуры секретов
# =============================================================================
# Этот файл НЕЗАШИФРОВАН и должен находиться в .gitignore (его роль —
# показать структуру). Реальные секреты лежат в secrets/default.yaml
# (зашифрованный, закоммитан).
#
# Как создать свой default.yaml:
#   1. cp secrets/_example.yaml secrets/default.yaml
#   2. Отредактируй default.yaml с реальными значениями (пока он
#      незашифрованный — будь осторожен, не закоммить в этом виде!)
#   3. Зашифруй: sops --encrypt --in-place secrets/default.yaml
#   4. Теперь файл зашифрован и безопасен для коммита.
#
# Как редактировать существующий зашифрованный secrets/default.yaml:
#   sops secrets/default.yaml
#   (открывает $EDITOR с расшифрованным содержимым; сохранил → автоматически
#    перешифровано на диске)
#
# Структура — иерархическая. Имя секрета в Nix-коде:
#   sops.secrets."ssh/github_key" = {};   ← полный путь через слеш
#   sops.secrets."wifi/home_psk"  = {};
# =============================================================================

ssh:
  # Приватный SSH-ключ для git push в github (например для коммитов от Bootstrap)
  github_key: |
    -----BEGIN OPENSSH PRIVATE KEY-----
    EXAMPLE_PASTE_REAL_KEY_HERE
    -----END OPENSSH PRIVATE KEY-----

  # Authorized_keys для root/wheel-юзеров (публичный ключ от админских машин)
  admin_authorized_keys: |
    ssh-ed25519 AAAA...EXAMPLE example@admin

wifi:
  # PSK для домашней сети — используется через networking.wireless.networks
  home_psk:     "EXAMPLE_HOME_WIFI_PASSWORD"
  office_psk:   "EXAMPLE_OFFICE_WIFI_PASSWORD"

api:
  # Токены для CLI-инструментов
  github_token: "ghp_EXAMPLE_REPLACE_WITH_REAL"
  openai_key:   "sk-EXAMPLE_REPLACE_WITH_REAL"

services:
  # Пароли сервисов которые могут понадобиться в системных модулях
  borg_passphrase:   "EXAMPLE_BACKUP_PASSWORD"
  postgres_admin:    "EXAMPLE_DB_PASSWORD"
