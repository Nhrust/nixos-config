# hyprlock.conf — Lock screen
# Запуск: Super+L (биндинг в hyprland.conf)

background {
    monitor =
    path    = ~/Pictures/wallpaper.png
    blur_passes = 3
    blur_size   = 8
}

input-field {
    monitor       =
    size          = 250, 50
    outline_thickness = 2
    dots_size     = 0.2
    dots_spacing  = 0.3
    inner_color   = rgb(30, 30, 46)
    outer_color   = rgb(203, 166, 247)
    font_color    = rgb(205, 214, 244)
    placeholder_text = <i>Введите пароль...</i>
    position      = 0, -100
    halign        = center
    valign        = center
}

label {
    monitor = 
    text    = cmd[update:1000] echo "$(date +"%H:%M")"
    font_size = 64
    color     = rgb(205, 214, 244)
    position  = 0, 100
    halign    = center
    valign    = center
}
