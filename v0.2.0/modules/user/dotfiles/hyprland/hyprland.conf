# =============================================================================
# hyprland.conf — Главный конфиг
# =============================================================================
# Состоит только из source-директив подключения модулей.
# Логика разнесена по conf/*.conf для удобства поддержки.
#
# user.conf подключается ПОСЛЕДНИМ и переопределяет всё что выше.
# =============================================================================

# ── Базовые модули (твоё видение) ──────────────────────────────────────────
source = ~/.config/hypr/conf/monitors.conf
source = ~/.config/hypr/conf/env.conf
source = ~/.config/hypr/conf/autostart.conf
source = ~/.config/hypr/conf/input.conf
source = ~/.config/hypr/conf/general.conf
source = ~/.config/hypr/conf/decoration.conf
source = ~/.config/hypr/conf/animations.conf
source = ~/.config/hypr/conf/misc.conf
source = ~/.config/hypr/conf/binds.conf
source = ~/.config/hypr/conf/windowrules.conf

source = ~/.config/hypr/conf/profile.conf

# ── Пользовательские override-ы ─────────────────────────────────────────────
# Этот файл создаётся при первой установке и больше не трогается обновлениями.
# Редактируй его как угодно — твои изменения переопределяют всё выше.
source = ~/.config/hypr/user.conf
