# =============================================================================
# misc.conf — Прочее: лого, splash, поведение
# =============================================================================

misc {
    disable_hyprland_logo    = true   # без вотермарки
    disable_splash_rendering = true   # без splash при старте
    force_default_wallpaper  = 0      # 0=отключено, обои через hyprpaper

    # Замечание: `vfr` (variable refresh rate в misc) был выпилен в свежих
    # версиях Hyprland. VRR теперь настраивается per-monitor через флаг:
    #   monitor = eDP-1, 1920x1080@60, 0x0, 1, vrr, 1
    # (или ставится в твоём user.conf / monitors.conf для конкретного экрана)
}

# XWayland scaling — для совместимости с X11 приложениями
xwayland {
    force_zero_scaling = true
}
