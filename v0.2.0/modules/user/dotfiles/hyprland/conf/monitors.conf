# =============================================================================
# monitors.conf — Конфигурация мониторов
# =============================================================================
# Формат: monitor=НАЗВАНИЕ,РАЗРЕШЕНИЕ@ЧАСТОТА,ПОЗИЦИЯ,МАСШТАБ
#
# Узнать имена подключённых мониторов: hyprctl monitors
#
# Примеры:
#   monitor=DP-1,2560x1440@144,0x0,1
#   monitor=HDMI-A-1,1920x1080@60,2560x0,1
#   monitor=eDP-1,preferred,auto,1.5    # ноутбучный экран с HiDPI
#
# Как работает override:
#   Дефолтная строка ниже использует пустое имя — это wildcard, она
#   применяется ко ВСЕМ мониторам которые не были упомянуты раньше.
#   Если ты в ~/.config/hypr/user.conf укажешь конкретное имя
#   (например `monitor = eDP-1, 1920x1080@60, 0x0, 1.0`), оно заменит
#   wildcard для eDP-1, остальные мониторы продолжат идти через wildcard.
#   То есть для override-а отдельного экрана не нужно ничего отключать —
#   просто перечисли его явно в user.conf, и Hyprland применит твою строку.
#
# Чтобы полностью отключить wildcard и описывать ВСЕ мониторы только в
# user.conf — раскомментируй ниже строку `monitor=,disable` ВМЕСТО wildcard.
# =============================================================================

# По умолчанию — автоопределение всех мониторов с предпочитаемым разрешением
monitor=,preferred,auto,auto

# Альтернатива (раскомментируй и закомментируй строку выше если хочешь
# описывать каждый монитор только в user.conf):
# monitor=,disable
