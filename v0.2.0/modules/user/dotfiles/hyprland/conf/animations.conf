# =============================================================================
# animations.conf — Анимации окон, воркспейсов, fade
# =============================================================================

animations {
    enabled = true

    bezier = ease,         0.25, 0.46, 0.45, 0.94
    bezier = easeOutQuint, 0.23, 1,    0.32, 1
    bezier = bounce,       0.34, 1.56, 0.64, 1

    animation = windows,     1, 5, ease
    animation = windowsOut,  1, 5, ease, popin 80%
    animation = windowsMove, 1, 5, ease
    animation = border,      1, 5, default
    animation = fade,        1, 5, default
    animation = workspaces,  1, 5, easeOutQuint
}
