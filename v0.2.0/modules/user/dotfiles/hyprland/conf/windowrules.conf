# =============================================================================
# windowrules.conf — Правила для конкретных окон (Hyprland 0.55+)
# =============================================================================
# СИНТАКСИС ИЗМЕНИЛСЯ в Hyprland 0.55 (май 2026):
#   Было: windowrule = float, class:^(pavucontrol)$
#   Стало: windowrule = float class:^(pavucontrol)$   (БЕЗ запятой между rule и селектором)
#
# `windowrulev2` удалён полностью.
#
# Узнать class/title окна: hyprctl clients
# Документация: https://wiki.hypr.land/Configuring/Window-Rules/
# =============================================================================

# Плавающие окна для диалогов и пикеров
windowrule = float class:^(pavucontrol)$
windowrule = float class:^(blueman-manager)$
windowrule = float class:^(nm-connection-editor)$
windowrule = float class:^(file-roller)$
windowrule = float class:^(org.gnome.Calculator)$
windowrule = float title:^(Open File)$
windowrule = float title:^(Save File)$
windowrule = float title:^(File Operation Progress)$

# Размер и центрирование для pavucontrol
windowrule = size 800 500 class:^(pavucontrol)$
windowrule = center class:^(pavucontrol)$

# Picture-in-Picture браузеров — плавающее и всегда поверх
windowrule = float title:^(Picture-in-Picture)$
windowrule = pin title:^(Picture-in-Picture)$

# Полноэкранные приложения — убрать скругления и тени
windowrule = noshadow fullscreen:1
windowrule = noborder fullscreen:1
