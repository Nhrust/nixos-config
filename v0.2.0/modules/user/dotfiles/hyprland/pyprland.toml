# =============================================================================
# pyprland.toml — Конфиг Python-плагинов для Hyprland
# =============================================================================
# Запускается через `exec-once = pypr` в autostart.conf.
#
# Использование scratchpad'ов:
#   pypr toggle term     — открыть/спрятать терминал-поверх-всего
#   pypr toggle notes    — открыть/спрятать заметки в helix
# Привязано к биндам Super+grave и Super+Shift+N (см. binds.conf).
# =============================================================================

[pyprland]
plugins = [
    "scratchpads",
    "smart_gaps",
]

# ── Scratchpads ──────────────────────────────────────────────────────────────

# Терминал-scratchpad — quake-style выпадающий из верха экрана.
# Класс "kitty-scratchpad" нужен чтобы pyprland мог его отслеживать.
[scratchpads.term]
animation = "fromTop"
command   = "kitty --class kitty-scratchpad"
class     = "kitty-scratchpad"
size      = "75% 60%"
margin    = 50

# Notes-scratchpad — кидаем helix на ~/.notes.md.
# Файл создаётся при первом запуске если его нет (см. scripts/notes.sh).
[scratchpads.notes]
animation = "fromTop"
command   = "kitty --class kitty-notes-scratchpad -e bash -c 'touch ~/.notes.md && hx ~/.notes.md'"
class     = "kitty-notes-scratchpad"
size      = "75% 60%"
margin    = 50

# ── Smart gaps ───────────────────────────────────────────────────────────────
# Когда на воркспейсе только одно окно — gaps_in/gaps_out обнуляются,
# окно занимает весь экран. Возвращаются автоматом когда появляется второе.
[smart_gaps]
